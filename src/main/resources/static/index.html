<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>ByteBank - Banco Digital</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, Helvetica, sans-serif; }

        body { background: #f4f7fb; color: #1f2937; }

        /* LOGIN */
        #telaLogin {
          display: flex; justify-content: center; align-items: center;
          min-height: 100vh; background: linear-gradient(135deg, #1e3a5f, #2563eb);
        }
        .login-box {
          background: white; border-radius: 20px; padding: 40px;
          width: 100%; max-width: 400px; box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .login-box h1 { font-size: 28px; color: #0f172a; margin-bottom: 6px; }
        .login-box p { color: #64748b; margin-bottom: 28px; font-size: 14px; }
        .login-tabs { display: flex; gap: 8px; margin-bottom: 24px; }
        .tab-btn {
          flex: 1; padding: 10px; border: 2px solid #e2e8f0; border-radius: 10px;
          background: white; color: #64748b; font-size: 14px; font-weight: bold;
          cursor: pointer; transition: 0.2s;
        }
        .tab-btn.active { border-color: #2563eb; color: #2563eb; background: #eff6ff; }

        /* DASHBOARD */
        #telaDashboard { display: none; }
        .topbar {
          background: #1e3a5f; color: white; padding: 16px 24px;
          display: flex; justify-content: space-between; align-items: center;
        }
        .topbar h1 { font-size: 22px; }
        .topbar-right { display: flex; align-items: center; gap: 16px; }
        .topbar span { font-size: 14px; opacity: 0.8; }
        .btn-logout {
          padding: 8px 16px; background: rgba(255,255,255,0.15);
          border: 1px solid rgba(255,255,255,0.3); border-radius: 8px;
          color: white; font-size: 13px; cursor: pointer; width: auto;
        }
        .btn-logout:hover { background: rgba(255,255,255,0.25); }

        .content { padding: 24px; max-width: 1280px; margin: 0 auto; }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; margin-bottom: 24px; }

        .card {
          background: white; border-radius: 16px; padding: 20px;
          box-shadow: 0 4px 16px rgba(0,0,0,0.07);
        }
        .card h2 { font-size: 18px; margin-bottom: 16px; color: #0f172a; }

        .form-group { margin-bottom: 14px; }
        .form-group label { display: block; margin-bottom: 6px; font-weight: bold; color: #334155; font-size: 13px; }
        .form-group input {
          width: 100%; padding: 11px 14px; border: 1px solid #cbd5e1;
          border-radius: 10px; outline: none; font-size: 14px;
        }
        .form-group input:focus { border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,0.15); }

        button {
          width: 100%; padding: 12px; border: none; border-radius: 10px;
          background: #2563eb; color: white; font-size: 14px; font-weight: bold;
          cursor: pointer; transition: 0.2s;
        }
        button:hover { background: #1d4ed8; }
        button.secondary { background: #0f766e; }
        button.secondary:hover { background: #0d5f59; }
        button.warning { background: #dc2626; }
        button.warning:hover { background: #b91c1c; }
        button.dark { background: #334155; }
        button.dark:hover { background: #1f2937; }

        .status {
          margin-bottom: 20px; padding: 14px 16px; border-radius: 12px;
          font-size: 14px; display: none;
        }
        .status.success { display: block; background: #dcfce7; color: #166534; border: 1px solid #86efac; }
        .status.error { display: block; background: #fee2e2; color: #991b1b; border: 1px solid #fca5a5; }

        .resultado-busca {
          margin-top: 14px; padding: 14px; border-radius: 12px;
          background: #f8fafc; border: 1px solid #e2e8f0;
          color: #334155; font-size: 14px; display: none; line-height: 1.8;
        }

        .list-card { background: white; border-radius: 16px; padding: 20px; box-shadow: 0 4px 16px rgba(0,0,0,0.07); }
        .list-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
        .list-header h2 { font-size: 20px; color: #0f172a; }
        .list-header button { width: auto; padding: 10px 16px; }

        table { width: 100%; border-collapse: collapse; }
        thead { background: #f1f5f9; }
        th, td { text-align: left; padding: 13px 12px; border-bottom: 1px solid #e5e7eb; font-size: 14px; }
        tbody tr:hover { background: #f8fafc; }

        .empty { text-align: center; padding: 32px; color: #64748b; }
        .acoes { display: flex; gap: 8px; }
        .btn-linha { width: auto; padding: 7px 12px; font-size: 13px; }
        .btn-excluir-linha { background: #dc2626; }
        .btn-excluir-linha:hover { background: #b91c1c; }
        .btn-editar-linha { background: #0f766e; }
        .btn-editar-linha:hover { background: #0d5f59; }

        .pagination { display: flex; justify-content: center; gap: 8px; margin-top: 16px; }
        .pagination button { width: auto; padding: 8px 14px; font-size: 13px; background: #e2e8f0; color: #334155; }
        .pagination button:hover { background: #cbd5e1; }
        .pagination button.active { background: #2563eb; color: white; }
    </style>
</head>
<body>

<!-- TELA DE LOGIN -->
<div id="telaLogin">
    <div class="login-box">
        <h1>🏦 ByteBank</h1>
        <p>Banco Digital — Acesse sua conta</p>

        <div class="login-tabs">
            <button class="tab-btn active" onclick="trocarTab('login')">Entrar</button>
            <button class="tab-btn" onclick="trocarTab('registrar')">Cadastrar</button>
        </div>

        <div id="loginStatus" class="status"></div>

        <div id="formLoginWrapper">
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="loginEmail" placeholder="seu@email.com"/>
            </div>
            <div class="form-group">
                <label>Senha</label>
                <input type="password" id="loginSenha" placeholder="Sua senha"/>
            </div>
            <button onclick="fazerLogin()">Entrar</button>
        </div>

        <div id="formRegistrarWrapper" style="display:none">
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="registrarEmail" placeholder="seu@email.com"/>
            </div>
            <div class="form-group">
                <label>Senha (mín. 6 caracteres)</label>
                <input type="password" id="registrarSenha" placeholder="Crie uma senha"/>
            </div>
            <button onclick="fazerRegistro()">Criar conta de acesso</button>
        </div>
    </div>
</div>

<!-- TELA DASHBOARD -->
<div id="telaDashboard">
    <div class="topbar">
        <h1>🏦 ByteBank</h1>
        <div class="topbar-right">
            <span id="emailLogado"></span>
            <button class="btn-logout" onclick="logout()">Sair</button>
        </div>
    </div>

    <div class="content">
        <div id="status" class="status"></div>

        <div class="grid">
            <div class="card">
                <h2>Criar Conta</h2>
                <div class="form-group">
                    <label>CPF (000.000.000-00)</label>
                    <input type="text" id="cpf" placeholder="000.000.000-00" maxlength="14"/>
                </div>
                <div class="form-group">
                    <label>Titular</label>
                    <input type="text" id="titular" placeholder="Nome completo"/>
                </div>
                <div class="form-group">
                    <label>Saldo inicial</label>
                    <input type="number" id="saldoInicial" placeholder="0.00" step="0.01" min="0"/>
                </div>
                <button onclick="criarConta()">Criar conta</button>
            </div>

            <div class="card">
                <h2>Buscar Conta por ID</h2>
                <div class="form-group">
                    <label>ID da conta</label>
                    <input type="number" id="buscarId" placeholder="Ex.: 1"/>
                </div>
                <button class="dark" onclick="buscarConta()">Buscar conta</button>
                <div id="resultadoBusca" class="resultado-busca"></div>
            </div>

            <div class="card">
                <h2>Atualizar Titular</h2>
                <div class="form-group">
                    <label>ID da conta</label>
                    <input type="number" id="atualizarId" placeholder="Ex.: 1"/>
                </div>
                <div class="form-group">
                    <label>Novo titular</label>
                    <input type="text" id="novoTitular" placeholder="Novo nome"/>
                </div>
                <button class="secondary" onclick="atualizarTitular()">Atualizar titular</button>
            </div>

            <div class="card">
                <h2>Depositar</h2>
                <div class="form-group">
                    <label>ID da conta</label>
                    <input type="number" id="depositoId" placeholder="Ex.: 1"/>
                </div>
                <div class="form-group">
                    <label>Valor</label>
                    <input type="number" id="depositoValor" placeholder="0.00" step="0.01" min="0.01"/>
                </div>
                <button class="secondary" onclick="depositar()">Depositar</button>
            </div>

            <div class="card">
                <h2>Sacar</h2>
                <div class="form-group">
                    <label>ID da conta</label>
                    <input type="number" id="saqueId" placeholder="Ex.: 1"/>
                </div>
                <div class="form-group">
                    <label>Valor</label>
                    <input type="number" id="saqueValor" placeholder="0.00" step="0.01" min="0.01"/>
                </div>
                <button class="warning" onclick="sacar()">Sacar</button>
            </div>

            <div class="card">
                <h2>Transferir</h2>
                <div class="form-group">
                    <label>Conta de origem</label>
                    <input type="number" id="origem" placeholder="Ex.: 1"/>
                </div>
                <div class="form-group">
                    <label>Conta de destino</label>
                    <input type="number" id="destino" placeholder="Ex.: 2"/>
                </div>
                <div class="form-group">
                    <label>Valor</label>
                    <input type="number" id="valorTransferencia" placeholder="0.00" step="0.01" min="0.01"/>
                </div>
                <button onclick="transferir()">Transferir</button>
            </div>
        </div>

        <div class="list-card">
            <div class="list-header">
                <h2>Contas cadastradas</h2>
                <button onclick="listarContas()">↻ Atualizar</button>
            </div>
            <div id="tableWrapper">
                <div class="empty">Nenhuma conta carregada ainda.</div>
            </div>
            <div class="pagination" id="paginacao"></div>
        </div>
    </div>
</div>

<script>
    let token = localStorage.getItem('bytebank_token');
    let emailUsuario = localStorage.getItem('bytebank_email');
    let paginaAtual = 0;

    // Formatar CPF automaticamente
    document.addEventListener('DOMContentLoaded', () => {
      const cpfInput = document.getElementById('cpf');
      if (cpfInput) {
        cpfInput.addEventListener('input', (e) => {
          let v = e.target.value.replace(/\D/g, '');
          if (v.length <= 11) {
            v = v.replace(/(\d{3})(\d)/, '$1.$2');
            v = v.replace(/(\d{3})(\d)/, '$1.$2');
            v = v.replace(/(\d{3})(\d{1,2})$/, '$1-$2');
          }
          e.target.value = v;
        });
      }

      if (token) mostrarDashboard();
    });

    function trocarTab(tab) {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      event.target.classList.add('active');
      document.getElementById('formLoginWrapper').style.display = tab === 'login' ? 'block' : 'none';
      document.getElementById('formRegistrarWrapper').style.display = tab === 'registrar' ? 'block' : 'none';
      document.getElementById('loginStatus').className = 'status';
    }

    function mostrarLoginStatus(msg, tipo) {
      const s = document.getElementById('loginStatus');
      s.className = `status ${tipo}`;
      s.textContent = msg;
    }

    async function fazerLogin() {
      const email = document.getElementById('loginEmail').value.trim();
      const senha = document.getElementById('loginSenha').value;
      if (!email || !senha) return mostrarLoginStatus('Preencha email e senha.', 'error');

      try {
        const res = await fetch('/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, senha })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.message || 'Credenciais inválidas');
        token = data.token;
        emailUsuario = email;
        localStorage.setItem('bytebank_token', token);
        localStorage.setItem('bytebank_email', email);
        mostrarDashboard();
      } catch (err) {
        mostrarLoginStatus(err.message, 'error');
      }
    }

    async function fazerRegistro() {
      const email = document.getElementById('registrarEmail').value.trim();
      const senha = document.getElementById('registrarSenha').value;
      if (!email || !senha) return mostrarLoginStatus('Preencha email e senha.', 'error');

      try {
        const res = await fetch('/auth/registrar', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, senha })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.message || 'Erro ao registrar');
        token = data.token;
        emailUsuario = email;
        localStorage.setItem('bytebank_token', token);
        localStorage.setItem('bytebank_email', email);
        mostrarDashboard();
      } catch (err) {
        mostrarLoginStatus(err.message, 'error');
      }
    }

    function mostrarDashboard() {
      document.getElementById('telaLogin').style.display = 'none';
      document.getElementById('telaDashboard').style.display = 'block';
      document.getElementById('emailLogado').textContent = emailUsuario || '';
      listarContas();
    }

    function logout() {
      token = null;
      emailUsuario = null;
      localStorage.removeItem('bytebank_token');
      localStorage.removeItem('bytebank_email');
      document.getElementById('telaLogin').style.display = 'flex';
      document.getElementById('telaDashboard').style.display = 'none';
    }

    function authHeaders() {
      return { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` };
    }

    function mostrarStatus(msg, tipo) {
      const s = document.getElementById('status');
      s.className = `status ${tipo}`;
      s.textContent = msg;
      setTimeout(() => s.className = 'status', 4000);
    }

    function formatarMoeda(valor) {
      return Number(valor).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
    }

    async function tratar(res) {
      const ct = res.headers.get('content-type') || '';
      const data = ct.includes('application/json') ? await res.json() : await res.text();
      if (!res.ok) {
        if (res.status === 403) throw new Error('Acesso negado. Sem permissão para esta operação.');
        if (res.status === 401) { logout(); throw new Error('Sessão expirada. Faça login novamente.'); }
        let msg = data?.message || 'Erro ao processar a requisição.';
        if (data?.errors) msg += ' ' + Object.entries(data.errors).map(([k,v]) => `${k}: ${v}`).join(' | ');
        throw new Error(msg);
      }
      return data;
    }

    async function criarConta() {
      const cpf = document.getElementById('cpf').value.trim();
      const titular = document.getElementById('titular').value.trim();
      const saldo = Number(document.getElementById('saldoInicial').value);
      if (!cpf || !titular) return mostrarStatus('Preencha CPF e titular.', 'error');

      try {
        const res = await fetch('/contas', {
          method: 'POST', headers: authHeaders(),
          body: JSON.stringify({ cpf, titular, saldo })
        });
        const data = await tratar(res);
        mostrarStatus(`Conta criada! ID: ${data.id}`, 'success');
        document.getElementById('cpf').value = '';
        document.getElementById('titular').value = '';
        document.getElementById('saldoInicial').value = '';
        listarContas();
      } catch (err) { mostrarStatus(err.message, 'error'); }
    }

    async function buscarConta() {
      const id = document.getElementById('buscarId').value;
      if (!id) return mostrarStatus('Informe o ID.', 'error');
      const rb = document.getElementById('resultadoBusca');
      try {
        const res = await fetch(`/contas/${id}`, { headers: authHeaders() });
        const c = await tratar(res);
        rb.style.display = 'block';
        rb.innerHTML = `<strong>ID:</strong> ${c.id}<br><strong>CPF:</strong> ${c.cpf}<br><strong>Titular:</strong> ${c.titular}<br><strong>Saldo:</strong> ${formatarMoeda(c.saldo)}`;
      } catch (err) {
        rb.style.display = 'none';
        mostrarStatus(err.message, 'error');
      }
    }

    async function atualizarTitular() {
      const id = document.getElementById('atualizarId').value;
      const titular = document.getElementById('novoTitular').value.trim();
      if (!id || !titular) return mostrarStatus('Preencha ID e novo titular.', 'error');
      try {
        const res = await fetch(`/contas/${id}/titular`, {
          method: 'PATCH', headers: authHeaders(),
          body: JSON.stringify({ titular })
        });
        const data = await tratar(res);
        mostrarStatus(`Titular atualizado: ${data.titular}`, 'success');
        listarContas();
      } catch (err) { mostrarStatus(err.message, 'error'); }
    }

    async function depositar() {
      const id = document.getElementById('depositoId').value;
      const valor = Number(document.getElementById('depositoValor').value);
      if (!id || !valor) return mostrarStatus('Preencha ID e valor.', 'error');
      try {
        const res = await fetch(`/contas/${id}/deposito`, {
          method: 'PUT', headers: authHeaders(),
          body: JSON.stringify({ valor })
        });
        const data = await tratar(res);
        mostrarStatus(`Depósito realizado! Saldo: ${formatarMoeda(data.saldo)}`, 'success');
        document.getElementById('depositoValor').value = '';
        listarContas();
      } catch (err) { mostrarStatus(err.message, 'error'); }
    }

    async function sacar() {
      const id = document.getElementById('saqueId').value;
      const valor = Number(document.getElementById('saqueValor').value);
      if (!id || !valor) return mostrarStatus('Preencha ID e valor.', 'error');
      try {
        const res = await fetch(`/contas/${id}/saque`, {
          method: 'PUT', headers: authHeaders(),
          body: JSON.stringify({ valor })
        });
        const data = await tratar(res);
        mostrarStatus(`Saque realizado! Saldo: ${formatarMoeda(data.saldo)}`, 'success');
        document.getElementById('saqueValor').value = '';
        listarContas();
      } catch (err) { mostrarStatus(err.message, 'error'); }
    }

    async function transferir() {
      const origem = Number(document.getElementById('origem').value);
      const destino = Number(document.getElementById('destino').value);
      const valor = Number(document.getElementById('valorTransferencia').value);
      if (!origem || !destino || !valor) return mostrarStatus('Preencha todos os campos.', 'error');
      try {
        const res = await fetch('/contas/transferencia', {
          method: 'PUT', headers: authHeaders(),
          body: JSON.stringify({ origem, destino, valor })
        });
        const data = await tratar(res);
        mostrarStatus(data.mensagem || 'Transferência realizada!', 'success');
        document.getElementById('valorTransferencia').value = '';
        listarContas();
      } catch (err) { mostrarStatus(err.message, 'error'); }
    }

    async function excluirConta(id) {
      if (!confirm(`Deseja excluir a conta ${id}?`)) return;
      try {
        const res = await fetch(`/contas/${id}`, { method: 'DELETE', headers: authHeaders() });
        const data = await tratar(res);
        mostrarStatus(data.mensagem || 'Conta excluída.', 'success');
        listarContas();
      } catch (err) { mostrarStatus(err.message, 'error'); }
    }

    function preencherAtualizacao(id, titular) {
      document.getElementById('atualizarId').value = id;
      document.getElementById('novoTitular').value = titular;
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    async function listarContas(pagina = 0) {
      paginaAtual = pagina;
      const tableWrapper = document.getElementById('tableWrapper');
      try {
        const res = await fetch(`/contas?page=${pagina}&size=10&sort=titular`, { headers: authHeaders() });
        const data = await tratar(res);
        const contas = data.content || [];

        if (contas.length === 0) {
          tableWrapper.innerHTML = '<div class="empty">Nenhuma conta cadastrada.</div>';
          document.getElementById('paginacao').innerHTML = '';
          return;
        }

        tableWrapper.innerHTML = `
          <table>
            <thead><tr><th>ID</th><th>CPF</th><th>Titular</th><th>Saldo</th><th>Ações</th></tr></thead>
            <tbody>
              ${contas.map(c => `
                <tr>
                  <td>${c.id}</td>
                  <td>${c.cpf}</td>
                  <td>${c.titular}</td>
                  <td>${formatarMoeda(c.saldo)}</td>
                  <td>
                    <div class="acoes">
                      <button class="btn-linha btn-editar-linha" onclick="preencherAtualizacao(${c.id}, '${(c.titular||'').replace(/'/g,"\\'")}')">Editar</button>
                      <button class="btn-linha btn-excluir-linha" onclick="excluirConta(${c.id})">Excluir</button>
                    </div>
                  </td>
                </tr>
              `).join('')}
            </tbody>
          </table>`;

        // Paginação
        const totalPaginas = data.totalPages || 1;
        let paginacaoHTML = '';
        for (let i = 0; i < totalPaginas; i++) {
          paginacaoHTML += `<button class="${i === pagina ? 'active' : ''}" onclick="listarContas(${i})">${i + 1}</button>`;
        }
        document.getElementById('paginacao').innerHTML = paginacaoHTML;

      } catch (err) {
        mostrarStatus(err.message, 'error');
      }
    }
</script>
</body>
</html>
